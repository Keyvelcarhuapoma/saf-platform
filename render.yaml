services:
  - type: web
    name: saf-predictive-engine
    env: python
    plan: free
    rootDir: predictive-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MIN_DATA_POINTS
        value: "5"
      - key: WARMUP_DATA_POINTS
        value: "15"
      - key: INFERENCE_INTERVAL_SEC
        value: "5"
